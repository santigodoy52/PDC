<!DOCTYPE HTML>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>CSS - Ejemplo 13</title>

  <!-- Enlace a Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Enlace a FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <link href="./css/style-iconmoon.css" rel="stylesheet">
  <link href="./css/style.css" rel="stylesheet">
</head>

<body>
  <h1><i class="fa-solid fa-font"></i> Encabezado con Roboto</h1>
  <p class="normal">Este es un párrafo con la fuente Roboto en peso normal.</p>
  <p class="negrita">Este es un párrafo con la fuente Roboto en negrita.</p>

  <p>Aquí hay algunos iconos en diferentes colores de <a class="enlace" href="https://fontawesome.com/" target="_blank">Font Awesome</a>:
    <i class="fa-solid fa-heart icono-rojo"></i>
    <i class="fa-solid fa-star icono-amarillo"></i>
    <i class="fa-solid fa-check icono-verde"></i>
    <i class="fa-solid fa-thumbs-up icono-azul"></i>
  </p>

  <p>Aquí hay algunos iconos en diferentes colores usando <a class="enlace" href="https://icomoon.io/app/" target="_blank">IcoMoon</a>:
    <i class="icon-home icono-azul"></i>
    <i class="icon-user icono-verde"></i>
    <i class="icon-mail icono-rojo"></i>
    <i class="icon-camera icono-amarillo"></i>
  </p>
