<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="validaciones.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Mi App</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Perfil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Salir</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid flex-grow-1">
    <div class="row">

        <!-- CONTENIDO PRINCIPAL -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <h2>Formulario</h2>

            <form>
                <div class="row">

                    <!-- Nombre -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" placeholder="Ingrese su nombre" required>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Ingrese su email" required>
                    </div>

                    <!-- Contraseña -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" required>
                    </div>

                    <!-- Selector -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Curso</label>
                        <select class="form-select" required>
                            <option selected disabled>Seleccione un curso</option>
                            <option>Introducción a la Programación</option>
                            <option>Diseño Web para Principiantes</option>
                            <option>Curso Avanzado de JavaScript</option>
                        </select>
                    </div>

                </div>

                <div class="col-12 mb-3" id="suscripciones">
                    <label class="form-label">Opciones de Suscripción</label>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="tec">
                        <label class="form-check-label" for="tec">
                            Noticias de Tecnología
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="cursos">
                        <label class="form-check-label" for="cursos">
                            Cursos Nuevos
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="ofertas">
                        <label class="form-check-label" for="ofertas">
                            Ofertas Especiales
                        </label>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>

        </main>
    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-4">
    <p class="mb-0">© 2026 Mi Sitio Web</p>
</footer>

</body>
</html>
