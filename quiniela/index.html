<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela de Córdoba</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5 text-center">
    <h1 class="mb-4">Quiniela de Córdoba</h1>

    <button id="btnSorteo" class="btn btn-primary mb-4">
        Iniciar sorteo
    </button>

    <!-- Display números -->
    <div id="display" class="d-flex justify-content-center mb-4"></div>

    <!-- Tabla -->
    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Combinación</th>
        </tr>
        </thead>
        <tbody id="tablaResultados"></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
