<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Template Completo Parcial</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Template Parcial Web</h1>

    <!-- CARD FORM -->
    <div class="card mb-4">
        <div class="card-header">Formulario Completo</div>
        <div class="card-body">

            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Texto</label>
                    <input id="inputTexto" type="text" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Número</label>
                    <input id="inputNumero" type="number" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Fecha</label>
                    <input id="inputFecha" type="date" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Selector</label>
                    <select id="selectOpciones" class="form-select">
                        <option value="">Seleccione</option>
                        <option value="A">Opción A</option>
                        <option value="B">Opción B</option>
                    </select>
                </div>
            </div>

            <!-- RADIO -->
            <div class="mb-3">
                <label>Radio</label><br>
                <input type="radio" name="radioGrupo" value="1"> Opción 1
                <input type="radio" name="radioGrupo" value="2"> Opción 2
            </div>

            <!-- CHECKBOX -->
            <div class="mb-3">
                <label>Checkbox</label><br>
                <input type="checkbox" value="X"> X
                <input type="checkbox" value="Y"> Y
            </div>

            <button id="btnAgregar" class="btn btn-success w-100">
                Agregar
            </button>

        </div>
    </div>

    <!-- DISPLAY -->
    <div id="display" class="d-flex flex-wrap mb-4"></div>

    <!-- LISTA -->
    <ul id="lista" class="list-group mb-4"></ul>

    <!-- TABLA -->
    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Texto</th>
            <th>Número</th>
            <th>Fecha</th>
            <th>Opción</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

    <!-- BOTONES -->
    <div class="text-center">
        <button id="btnTimer" class="btn btn-primary me-2">Random</button>
        <button id="btnClear" class="btn btn-danger">Limpiar</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
